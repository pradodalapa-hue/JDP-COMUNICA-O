<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>JDP MASTER - COMANDO SUPREMO v24</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #bf953f; --blue: #00f2ff; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; display: grid; grid-template-columns: 380px 1fr; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR INDUSTRIAL */
        .sidebar { background: #0a0a0a; border-right: 2px solid var(--gold); padding: 20px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .section-title { font-family: 'Orbitron'; color: var(--gold); font-size: 0.8rem; border-bottom: 1px solid #333; padding-bottom: 5px; margin-top: 15px; text-transform: uppercase; }
        
        .user-card { 
            background: #111; border: 1px solid #333; padding: 12px; cursor: pointer;
            border-left: 5px solid #444; transition: 0.3s; position: relative;
        }
        .user-card.request { border-left-color: var(--blue); animation: pulse 2s infinite; }
        .user-card.authorized { border-left-color: #0f0; }
        .user-card.active { background: #1a1a1a; border-left-width: 10px; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        /* PAINEL CENTRAL */
        .main-panel { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; position: relative; }
        .code-display { font-family: 'Orbitron'; font-size: 6rem; color: var(--gold); margin: 20px 0; text-shadow: 0 0 30px rgba(191,149,63,0.5); }
        
        .btn-master {
            padding: 25px 60px; background: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728); color: black; 
            font-family: 'Orbitron'; font-weight: bold; border: none; cursor: pointer; font-size: 1rem;
            clip-path: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%);
        }
        .btn-master:disabled { background: #222; color: #555; cursor: not-allowed; clip-path: none; }

        #log { position: absolute; bottom: 0; width: 100%; height: 120px; background: rgba(0,0,0,0.95); font-family: monospace; font-size: 0.75rem; color: var(--blue); padding: 10px; overflow-y: auto; border-top: 2px solid var(--gold); }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="font-family:'Orbitron'; color:var(--gold); text-align:center; margin:0;">JDP COMMAND</h2>
        <div style="font-size:0.6rem; text-align:center; color:var(--blue);">KERNEL v24.5 - DIRETÓRIO ATIVO</div>
        
        <div class="section-title">Solicitações de Acesso</div>
        <div id="request-list"></div>
        
        <div class="section-title">Operadores na Rede</div>
        <div id="authorized-list"></div>
        
        <button onclick="limparDiretorio()" style="margin-top:auto; background:none; border:1px solid red; color:red; cursor:pointer; font-size:0.6rem; padding:5px;">RESETAR DIRETÓRIO</button>
    </div>

    <div class="main-panel">
        <div id="status-header" style="color:var(--blue); font-family:'Orbitron';">AGUARDANDO SELEÇÃO...</div>
        <h1 id="target-name" style="font-family:'Orbitron'; font-size:1.5rem; margin:10px 0;">---</h1>
        
        <div class="code-display" id="code-out">------</div>
        
        <button class="btn-master" id="btn-send" onclick="injetarCodigo()" disabled>INJETAR CÓDIGO DE ACESSO</button>

        <div id="log"></div>
    </div>

    <script>
        const MASTER_ID = 'JDP-MASTER-STATION-99';
        let peer;
        let connections = {};
        let selectedId = null;
        
        // BANCO DE DADOS DE OPERADORES (Persistência do Sr. José)
        let globalDirectory = JSON.parse(localStorage.getItem('jdp_directory') || '[]');

        function init() {
            peer = new Peer(MASTER_ID);
            
            peer.on('open', (id) => {
                log("ESTAÇÃO MASTER ONLINE: " + id);
                renderDirectory();
            });

            peer.on('connection', conn => {
                conn.on('open', () => {
                    connections[conn.peer] = conn;
                    log("NOVA CONEXÃO DETECTADA: " + conn.peer);
                    
                    conn.on('data', data => {
                        // CASO 1: Solicitação de novo acesso
                        if(data.type === 'REQUEST') {
                            addRequestUI(data.name, conn.peer);
                        }
                        
                        // CASO 2: Sincronização de Agenda (Operador já ativo)
                        if(data.type === 'SYNC_ME') {
                            atualizarDiretorio(data.id, data.name);
                            log("SINCRONIZANDO AGENDA COM: " + data.name);
                            conn.send({ type: 'DIRECTORY_SYNC', list: globalDirectory });
                        }
                    });
                });

                conn.on('close', () => {
                    log("CONEXÃO ENCERRADA: " + conn.peer);
                    delete connections[conn.peer];
                });
            });
        }

        function addRequestUI(name, id) {
            const list = document.getElementById('request-list');
            const div = document.createElement('div');
            div.className = 'user-card request';
            div.id = 'req-' + id;
            div.innerHTML = `<strong>${name.toUpperCase()}</strong><br><small>SOLICITANDO ACESSO...</small>`;
            div.onclick = () => selectUser(id, name, true);
            list.appendChild(div);
            log("PEDIDO DE ACESSO: " + name);
        }

        function selectUser(id, name, isRequest) {
            selectedId = id;
            document.querySelectorAll('.user-card').forEach(c => c.classList.remove('active'));
            const card = document.getElementById((isRequest ? 'req-' : 'auth-') + id);
            if(card) card.classList.add('active');

            document.getElementById('target-name').innerText = name.toUpperCase();
            document.getElementById('status-header').innerText = isRequest ? "VALIDAÇÃO PENDENTE" : "OPERADOR AUTORIZADO";
            document.getElementById('btn-send').disabled = !isRequest;
        }

        function injetarCodigo() {
            if(!selectedId || !connections[selectedId]) {
                alert("Conexão perdida com o operador!");
                return;
            }
            const code = Math.floor(100000 + Math.random() * 900000);
            document.getElementById('code-out').innerText = code;
            
            connections[selectedId].send({
                type: 'AUTO_FILL_CODE',
                value: code
            });

            log("CÓDIGO " + code + " ENVIADO PARA " + selectedId);
            // Remove da lista de requests após enviar
            document.getElementById('req-' + selectedId)?.remove();
        }

        function atualizarDiretorio(id, name) {
            if(!globalDirectory.find(u => u.id === id)) {
                globalDirectory.push({ id, name });
                localStorage.setItem('jdp_directory', JSON.stringify(globalDirectory));
                renderDirectory();
            }
        }

        function renderDirectory() {
            const list = document.getElementById('authorized-list');
            list.innerHTML = '';
            globalDirectory.forEach(user => {
                const div = document.createElement('div');
                div.className = 'user-card authorized';
                div.id = 'auth-' + user.id;
                div.innerHTML = `<strong>${user.name.toUpperCase()}</strong><br><small>${user.id}</small>`;
                div.onclick = () => selectUser(user.id, user.name, false);
                list.appendChild(div);
            });
        }

        function limparDiretorio() {
            if(confirm("Deseja resetar toda a lista de operadores?")) {
                localStorage.removeItem('jdp_directory');
                globalDirectory = [];
                renderDirectory();
                log("DIRETÓRIO RESETADO PELO MASTER.");
            }
        }

        function log(m) {
            const l = document.getElementById('log');
            l.innerHTML += `> ${m}<br>`;
            l.scrollTop = l.scrollHeight;
        }

        init();
    </script>
</body>
</html>
