<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JDP SUPREME - KERNEL v28</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #bf953f; --blue: #00f2ff; --bg: #050505; --card: #0d0d0d; --red: #ff3333; --neon: 0 0 15px var(--blue); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100dvh; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; overflow: hidden; }

        /* ESTÉTICA SUPREME */
        .screen { display: none; height: 100dvh; flex-direction: column; background: radial-gradient(circle at center, #111 0%, #000 100%); }
        .active { display: flex; }
        .industrial-grid { position: fixed; inset: 0; background-image: linear-gradient(#111 1px, transparent 1px), linear-gradient(90deg, #111 1px, transparent 1px); background-size: 40px 40px; z-index: -1; opacity: 0.3; }

        /* LOGIN COM SCANNER */
        .gate-box { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: var(--card); border: 2px solid var(--gold); padding: 30px; width: 100%; max-width: 380px; text-align: center; border-radius: 5px; position: relative; box-shadow: 0 0 50px rgba(0,0,0,1); }
        .scanner-line { position: absolute; width: 100%; height: 2px; background: var(--blue); top: 0; left: 0; animation: scan 3s infinite linear; box-shadow: var(--neon); display: none; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        input { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #333; color: var(--blue); text-align: center; font-size: 1.1rem; font-family: 'Rajdhani'; border-radius: 0; border-bottom: 2px solid var(--gold); }
        .btn-supreme { width: 100%; padding: 18px; background: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728); border: none; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; color: black; text-transform: uppercase; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); margin-top: 15px; }

        /* HUB & CHAT */
        header { height: 80px; background: #000; border-bottom: 2px solid var(--gold); display: flex; align-items: center; padding: 0 20px; gap: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .avatar { width: 50px; height: 50px; border: 2px solid var(--gold); border-radius: 5px; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; color: var(--gold); background: #111; box-shadow: var(--neon); }
        
        #chat-msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .bubble { max-width: 85%; padding: 15px; border-radius: 5px; font-size: 1rem; position: relative; border: 1px solid #333; }
        .me { align-self: flex-end; background: rgba(0, 242, 255, 0.05); border-right: 4px solid var(--blue); }
        .them { align-self: flex-start; background: rgba(191, 149, 63, 0.05); border-left: 4px solid var(--gold); }

        /* BARRA DE TECNOLOGIAS */
        .tech-bar { background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; padding: 10px; }
        .tech-btn { background: none; border: 1px solid #333; color: var(--gold); padding: 10px; border-radius: 5px; font-size: 1.2rem; cursor: pointer; transition: 0.3s; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; }
        .tech-btn:active { background: var(--gold); color: black; box-shadow: 0 0 15px var(--gold); }
        
        #ptt-btn.active { background: var(--red); color: white; animation: pulse 1s infinite; border-color: white; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .input-area { padding: 15px; background: #080808; display: flex; gap: 10px; align-items: center; }
        #chat-input { flex: 1; background: #000; border: 1px solid #333; padding: 15px; color: white; border-radius: 5px; }

        /* OVERLAYS */
        .status-tag { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; color: var(--blue); }
    </style>
</head>
<body>
    <div class="industrial-grid"></div>

    <!-- TELA DE AUTENTICAÇÃO -->
    <div id="screen-auth" class="screen active">
        <div class="gate-box">
            <div class="card">
                <div class="scanner-line" id="scanner"></div>
                <h2 style="font-family:'Orbitron'; color:var(--gold); margin:0;">JDP SUPREME</h2>
                <p class="status-tag">Security Kernel v28.5</p>
                
                <div id="auth-ui">
                    <input type="text" id="auth-user" placeholder="ID DO OPERADOR">
                    <input type="password" id="auth-pass" placeholder="CHAVE DE ACESSO">
                    <button class="btn-supreme" onclick="tentarLogin()">VALIDAR BIOMETRIA</button>
                    <button class="btn-supreme" style="background:none; color:var(--blue); border:1px solid var(--blue);" onclick="mostrarCadastro()">SOLICITAR NOVO ACESSO</button>
                </div>

                <div id="reg-ui" style="display:none;">
                    <input type="text" id="reg-nome" placeholder="NOME COMPLETO">
                    <input type="password" id="reg-pass" placeholder="DEFINIR SENHA">
                    <button class="btn-supreme" onclick="solicitarCadastro()">ENVIAR PARA O MASTER</button>
                </div>

                <div id="wait-ui" style="display:none;">
                    <div class="avatar" style="margin: 20px auto; width: 80px; height: 80px; font-size: 2rem;">?</div>
                    <p id="wait-msg" style="color:var(--gold); font-family:'Orbitron';">AGUARDANDO MASTER...</p>
                    <div id="code-area" style="display:none;">
                        <div id="display-code" style="font-size:3rem; color:var(--blue); margin:20px 0; font-family:'Orbitron'; text-shadow: var(--neon);">------</div>
                        <button class="btn-supreme" onclick="location.reload()">SISTEMA LIBERADO</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- HUB PRINCIPAL -->
    <div id="screen-hub" class="screen">
        <header>
            <div class="avatar" id="my-avatar">?</div>
            <div style="flex:1">
                <div id="my-display-name" style="font-family:'Orbitron'; font-size:1rem; color:var(--gold);">---</div>
                <div class="status-tag" id="my-display-id">ID: ---</div>
            </div>
            <div style="text-align:right">
                <div class="status-tag" style="color:#0f0">● ONLINE</div>
                <button onclick="location.reload()" style="background:none; border:none; color:var(--red); font-size:0.7rem; cursor:pointer;">DESCONECTAR</button>
            </div>
        </header>
        <div id="list-container" style="flex:1; overflow-y:auto; padding:15px;"></div>
    </div>

    <!-- CHAT TÁTICO -->
    <div id="chat-screen" class="screen" style="background: #050505;">
        <header>
            <button onclick="fecharChat()" class="tech-btn" style="border:none; font-size:1.5rem;">←</button>
            <div style="flex:1">
                <div id="chat-title" style="font-family:'Orbitron'; font-size:1rem;">---</div>
                <div id="typing-status" class="status-tag" style="height:10px;"></div>
            </div>
            <button onclick="iniciarChamada()" class="tech-btn">📞</button>
        </header>

        <div id="chat-msgs"></div>

        <div class="tech-bar">
            <label class="tech-btn">📷<input type="file" hidden accept="image/*" onchange="enviarMidia('IMG', this)"></label>
            <label class="tech-btn">📂<input type="file" hidden onchange="enviarMidia('FILE', this)"></label>
            <button class="tech-btn" onclick="enviarLocalizacao()">📍</button>
            <button id="ptt-btn" class="tech-btn" style="width:80px; border-radius:40px;">PTT</button>
        </div>

        <div class="input-area">
            <input type="text" id="chat-input" placeholder="ENVIAR COMANDO..." oninput="notificarDigitando()">
            <button class="tech-btn" onclick="enviarTexto()" style="color:var(--blue); border-color:var(--blue);">➤</button>
        </div>
    </div>

    <script>
        const MASTER_ID = 'JDP-MASTER-STATION-99';
        let peer, myID, activeChat = null, mediaRecorder, audioChunks = [];
        let db = { contacts: [], history: {} };

        // --- TECNOLOGIAS DE SEGURANÇA ---
        async function hash(p) {
            const m = new TextEncoder().encode(p);
            const h = await crypto.subtle.digest('SHA-256', m);
            return Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function mostrarCadastro() { 
            document.getElementById('auth-ui').style.display = 'none'; 
            document.getElementById('reg-ui').style.display = 'block'; 
        }

        async function tentarLogin() {
            document.getElementById('scanner').style.display = 'block';
            const user = document.getElementById('auth-user').value;
            const pass = await hash(document.getElementById('auth-pass').value);
            
            peer = new Peer('JDP-LGN-' + Math.floor(Math.random()*999));
            peer.on('open', () => {
                const conn = peer.connect(MASTER_ID);
                conn.on('open', () => conn.send({ type: 'LOGIN', user, hash: pass }));
                conn.on('data', data => {
                    if(data.type === 'LOGIN_SUCCESS') { myID = data.peerID; iniciarSistema(); }
                    else { alert("BIOMETRIA INVÁLIDA"); location.reload(); }
                });
            });
        }

        async function solicitarCadastro() {
            const nome = document.getElementById('reg-nome').value;
            const pass = await hash(document.getElementById('reg-pass').value);
            peer = new Peer('JDP-TEMP-' + Math.floor(Math.random()*999));
            peer.on('open', () => {
                const conn = peer.connect(MASTER_ID);
                conn.on('open', () => {
                    conn.send({ type: 'REGISTER', name: nome, hash: pass });
                    document.getElementById('reg-ui').style.display = 'none';
                    document.getElementById('wait-ui').style.display = 'block';
                });
                conn.on('data', data => {
                    if(data.type === 'AUTO_FILL_CODE') {
                        document.getElementById('wait-msg').innerText = "ACESSO AUTORIZADO";
                        document.getElementById('code-area').style.display = 'block';
                        document.getElementById('display-code').innerText = data.value;
                    }
                });
            });
        }

        // --- CORE DO SISTEMA ---
        function iniciarSistema() {
            document.getElementById('screen-auth').classList.remove('active');
            document.getElementById('screen-hub').classList.add('active');
            document.getElementById('my-display-name').innerText = myID.split('-')[1];
            document.getElementById('my-display-id').innerText = myID;
            document.getElementById('my-avatar').innerText = myID.split('-')[1][0];

            if(peer) peer.destroy();
            peer = new Peer(myID);
            peer.on('open', () => sync());
            peer.on('connection', conn => {
                conn.on('data', data => {
                    if(data.type === 'DIRECTORY_SYNC') { db.contacts = data.list.filter(c => c.id !== myID); renderList(); }
                    else { receberMensagem(data, conn.peer); }
                });
            });
        }

        function sync() {
            const conn = peer.connect(MASTER_ID);
            conn.on('open', () => conn.send({ type: 'SYNC_ME', id: myID, name: myID.split('-')[1] }));
        }

        // --- TECNOLOGIAS DE CONVERSA SUPREMA ---
        
        // 1. PTT (Push-to-Talk)
        const pttBtn = document.getElementById('ptt-btn');
        const handlePTTStart = (e) => {
            e.preventDefault();
            pttBtn.classList.add('active');
            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.start();
            });
        };
        const handlePTTEnd = () => {
            pttBtn.classList.remove('active');
            if(mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/ogg' });
                    const reader = new FileReader();
                    reader.onload = () => enviarPayload({ type: 'AUDIO', content: reader.result });
                    reader.readAsDataURL(blob);
                };
            }
        };
        pttBtn.addEventListener('mousedown', handlePTTStart);
        pttBtn.addEventListener('mouseup', handlePTTEnd);
        pttBtn.addEventListener('touchstart', handlePTTStart);
        pttBtn.addEventListener('touchend', handlePTTEnd);

        // 2. Localização Tática
        function enviarLocalizacao() {
            navigator.geolocation.getCurrentPosition(pos => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const mapUrl = `https://www.google.com/maps?q=${lat},${lon}`;
                enviarPayload({ type: 'TEXT', content: `📍 COORDENADAS TÁTICAS:\n${lat}, ${lon}\n[ABRIR MAPA]: ${mapUrl}` });
            });
        }

        // 3. Transferência de Arquivos e Imagens
        function enviarMidia(type, input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = () => enviarPayload({ type: type, content: reader.result, fileName: file.name });
            reader.readAsDataURL(file);
        }

        function enviarTexto() {
            const input = document.getElementById('chat-input');
            if(!input.value) return;
            enviarPayload({ type: 'TEXT', content: input.value });
            input.value = '';
        }

        function enviarPayload(payload) {
            const conn = peer.connect(activeChat.id);
            conn.on('open', () => {
                payload.sender = myID.split('-')[1];
                conn.send(payload);
                salvarNoHistorico(activeChat.id, payload, 'me');
                renderMessages();
            });
        }

        function receberMensagem(data, fromID) {
            salvarNoHistorico(fromID, data, 'them');
            if(activeChat && activeChat.id === fromID) renderMessages();
        }

        function salvarNoHistorico(chatId, data, side) {
            if(!db.history[chatId]) db.history[chatId] = [];
            db.history[chatId].push({ side, ...data });
        }

        function renderMessages() {
            const container = document.getElementById('chat-msgs');
            container.innerHTML = '';
            (db.history[activeChat.id] || []).forEach(m => {
                const div = document.createElement('div');
                div.className = `bubble ${m.side}`;
                let content = m.content;
                if(m.type === 'IMG') content = `<img src="${m.content}" style="max-width:100%; border-radius:5px;">`;
                if(m.type === 'AUDIO') content = `<audio controls src="${m.content}" style="width:200px; filter:invert(1);"></audio>`;
                if(m.type === 'FILE') content = `<div style="color:var(--blue)">📄 ARQUIVO: ${m.fileName}</div><a href="${m.content}" download="${m.fileName}" style="color:var(--gold)">BAIXAR DOCUMENTO</a>`;
                
                div.innerHTML = `<small style="display:block; font-size:0.6rem; color:var(--gold); margin-bottom:5px;">${m.sender || 'SISTEMA'}</small>${content}`;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        function renderList() {
            const container = document.getElementById('list-container');
            container.innerHTML = '<p class="status-tag">OPERADORES NA REDE</p>';
            db.contacts.forEach(c => {
                const div = document.createElement('div');
                div.style = "background:#0d0d0d; border:1px solid #222; padding:15px; margin-bottom:10px; display:flex; align-items:center; gap:15px; border-left:4px solid var(--blue); cursor:pointer;";
                div.onclick = () => abrirChat(c.id, c.name);
                div.innerHTML = `<div class="avatar">${c.name[0]}</div><div><b>${c.name}</b><br><small style="color:#555">${c.id}</small></div>`;
                container.appendChild(div);
            });
        }

        function abrirChat(id, name) {
            activeChat = { id, name };
            document.getElementById('chat-screen').classList.add('active');
            document.getElementById('chat-title').innerText = name;
            renderMessages();
        }

        function fecharChat() { document.getElementById('chat-screen').classList.remove('active'); activeChat = null; }
    </script>
</body>
</html>
