<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JDP CLIENT - SUPREME v22</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #bf953f; --blue: #00f2ff; --bg: #050505; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100dvh; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; overflow: hidden; }

        .screen { display: none; height: 100dvh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .active { display: flex; }

        .card { background: #0a0a0a; border: 2px solid var(--gold); padding: 30px; width: 100%; max-width: 350px; text-align: center; box-shadow: 0 0 30px rgba(191,149,63,0.2); }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #333; color: var(--blue); text-align: center; font-size: 1.2rem; font-family: 'Orbitron'; }
        button { width: 100%; padding: 18px; background: var(--gold); border: none; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; color: black; }
        button:disabled { background: #222; color: #555; cursor: not-allowed; }

        /* STATUS LOG */
        #status-bar { position: fixed; top: 0; width: 100%; padding: 5px; font-size: 0.6rem; text-align: center; background: rgba(0,0,0,0.8); color: var(--blue); font-family: monospace; z-index: 1000; }

        /* INTERFACE WHATSAPP */
        #main-hub { display: none; flex-direction: column; height: 100dvh; width: 100%; }
        header { height: 60px; background: #000; border-bottom: 2px solid var(--gold); display: flex; align-items: center; padding: 0 15px; justify-content: space-between; }
        #contact-list { flex: 1; overflow-y: auto; padding: 10px; }
        .contact-item { background: #0d0d0d; border: 1px solid #1a1a1a; padding: 15px; margin-bottom: 8px; display: flex; align-items: center; gap: 15px; }
        
        #chat-window { display: none; position: fixed; inset: 0; background: var(--bg); flex-direction: column; z-index: 200; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px; border-radius: 4px; }
        .msg.me { align-self: flex-end; background: #003335; border-right: 3px solid var(--blue); }
        .msg.them { align-self: flex-start; background: #1a1a1a; border-left: 3px solid var(--gold); }
        
        .input-area { padding: 10px; background: #000; display: flex; gap: 10px; }
        .fab { position: fixed; bottom: 20px; right: 20px; width: 55px; height: 55px; background: var(--blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; font-size: 2rem; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="status-bar">SISTEMA INICIALIZANDO...</div>

    <!-- TELA 1: SOLICITAÇÃO -->
    <div id="step1" class="screen active">
        <div class="card">
            <h2 style="font-family:'Orbitron'; color:var(--gold);">JDP INDUSTRIAL</h2>
            <input type="text" id="nome-op" placeholder="NOME DO OPERADOR">
            <button id="btn-solicitar" onclick="conectarAoMaster()">SOLICITAR ACESSO</button>
        </div>
    </div>

    <!-- TELA 2: VALIDAÇÃO -->
    <div id="step2" class="screen">
        <div class="card">
            <h2 style="font-family:'Orbitron'; color:var(--gold);">VALIDAÇÃO</h2>
            <p style="font-size:0.7rem; color:#888;">AGUARDANDO INJEÇÃO DO SR. JOSÉ...</p>
            <input type="number" id="input-code" placeholder="------" readonly>
            <button id="btn-liberar" disabled onclick="finalizarAtivacao()">AGUARDANDO...</button>
        </div>
    </div>

    <!-- TELA 3: HUB (WHATSAPP) -->
    <div id="main-hub">
        <header>
            <div style="font-family:'Orbitron'; font-size:0.8rem; color:var(--gold);" id="display-user">OPERADOR</div>
            <button onclick="localStorage.clear(); location.reload();" style="background:none; border:none; color:red; font-size:0.6rem;">LOGOUT</button>
        </header>
        <div id="contact-list"></div>
        <div class="fab" onclick="addAmigo()">+</div>
    </div>

    <!-- JANELA DE CHAT -->
    <div id="chat-window">
        <header>
            <button onclick="fecharChat()" style="background:none; border:none; color:var(--gold); font-size:1.2rem;">← VOLTAR</button>
            <span id="chat-target" style="font-family:'Orbitron'; font-size:0.8rem;">---</span>
        </header>
        <div id="chat-messages"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Mensagem..." style="margin:0; text-align:left;">
            <button onclick="enviarMensagem()" style="width:80px;">></button>
        </div>
    </div>

    <script>
        const MASTER_ID = 'JDP-MASTER-STATION-99';
        let peer, conn, myID, activeChatID;
        let contatos = JSON.parse(localStorage.getItem('jdp_contatos') || '[]');
        let mensagens = JSON.parse(localStorage.getItem('jdp_msgs') || '{}');

        function setStatus(msg) { document.getElementById('status-bar').innerText = msg; }

        window.onload = () => {
            const salvo = localStorage.getItem('JDP_PERM_ID');
            if(salvo) {
                myID = salvo;
                iniciarHub();
            } else {
                setStatus("PRONTO PARA SOLICITAÇÃO");
            }
        };

        // --- FASE DE ACESSO ---
        function conectarAoMaster() {
            const nome = document.getElementById('nome-op').value;
            if(!nome) return alert("Insira seu nome");

            setStatus("CRIANDO IDENTIDADE TEMPORÁRIA...");
            const tempID = 'JDP-TEMP-' + Math.floor(Math.random()*9999);
            peer = new Peer(tempID);

            peer.on('open', (id) => {
                setStatus("CONECTANDO AO MASTER JDP...");
                const c = peer.connect(MASTER_ID);
                
                c.on('open', () => {
                    setStatus("CONECTADO! ENVIANDO PEDIDO...");
                    c.send({ type: 'REQUEST', name: nome });
                    document.getElementById('step1').classList.remove('active');
                    document.getElementById('step2').classList.add('active');
                });

                c.on('data', data => {
                    if(data.type === 'AUTO_FILL_CODE') {
                        setStatus("CÓDIGO RECEBIDO!");
                        document.getElementById('input-code').value = data.value;
                        const btn = document.getElementById('btn-liberar');
                        btn.disabled = false;
                        btn.innerText = "LIBERAR ACESSO AGORA";
                        btn.style.background = "var(--blue)";
                        localStorage.setItem('TEMP_NAME', nome);
                    }
                });

                c.on('error', () => setStatus("ERRO: MASTER OFFLINE"));
            });
        }

        function finalizarAtivacao() {
            const nome = localStorage.getItem('TEMP_NAME');
            myID = "JDP-" + nome.toUpperCase() + "-" + Math.random().toString(36).substr(2,4).toUpperCase();
            localStorage.setItem('JDP_PERM_ID', myID);
            location.reload();
        }

        // --- FASE HUB (WHATSAPP) ---
        function iniciarHub() {
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'none';
            document.getElementById('main-hub').style.display = 'flex';
            document.getElementById('display-user').innerText = myID;
            setStatus("SISTEMA ONLINE - ID: " + myID);
            
            renderContatos();

            peer = new Peer(myID);
            peer.on('connection', c => {
                c.on('data', data => {
                    salvarMsg(c.peer, data.text, 'them');
                    if(activeChatID === c.peer) renderMsgs();
                });
            });
        }

        function addAmigo() {
            const id = prompt("ID DO AMIGO (JDP-XXXX-XXXX):");
            if(id && id.startsWith('JDP-') && id !== myID) {
                if(!contatos.includes(id)) {
                    contatos.push(id);
                    localStorage.setItem('jdp_contatos', JSON.stringify(contatos));
                    renderContatos();
                }
            }
        }

        function renderContatos() {
            const list = document.getElementById('contact-list');
            list.innerHTML = '';
            contatos.forEach(id => {
                const div = document.createElement('div');
                div.className = 'contact-item';
                div.onclick = () => abrirChat(id);
                div.innerHTML = `<b>${id.split('-')[1]}</b><br><small>${id}</small>`;
                list.appendChild(div);
            });
        }

        function abrirChat(id) {
            activeChatID = id;
            document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('chat-target').innerText = id;
            renderMsgs();
            conn = peer.connect(id);
        }

        function enviarMensagem() {
            const input = document.getElementById('msg-input');
            if(!input.value) return;
            if(conn && conn.open) conn.send({ text: input.value });
            salvarMsg(activeChatID, input.value, 'me');
            renderMsgs();
            input.value = '';
        }

        function salvarMsg(pID, txt, side) {
            if(!mensagens[pID]) mensagens[pID] = [];
            mensagens[pID].push({ side, txt });
            localStorage.setItem('jdp_msgs', JSON.stringify(mensagens));
        }

        function renderMsgs() {
            const flow = document.getElementById('chat-messages');
            flow.innerHTML = '';
            (mensagens[activeChatID] || []).forEach(m => {
                const d = document.createElement('div');
                d.className = `msg ${m.side}`;
                d.innerText = m.txt;
                flow.appendChild(d);
            });
            flow.scrollTop = flow.scrollHeight;
        }

        function fecharChat() { document.getElementById('chat-window').style.display = 'none'; activeChatID = null; }
    </script>
</body>
</html>
