<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>JDP MASTER - SUPREME SECURITY v26</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #bf953f; --blue: #00f2ff; --bg: #050505; --red: #ff4444; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; display: grid; grid-template-columns: 380px 1fr; height: 100vh; overflow: hidden; }
        
        .sidebar { background: #0a0a0a; border-right: 2px solid var(--gold); padding: 20px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .section-title { font-family: 'Orbitron'; color: var(--gold); font-size: 0.8rem; border-bottom: 1px solid #333; padding-bottom: 5px; margin-top: 15px; text-transform: uppercase; }
        
        .user-card { 
            background: #111; border: 1px solid #333; padding: 12px; cursor: pointer;
            border-left: 5px solid #444; transition: 0.3s; position: relative;
        }
        .user-card.request { border-left-color: var(--blue); animation: pulse 2s infinite; }
        .user-card.authorized { border-left-color: #0f0; }
        .user-card.active { background: #1a1a1a; border-left-width: 10px; border-left-color: var(--gold); }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .main-panel { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; position: relative; }
        .code-display { font-family: 'Orbitron'; font-size: 6rem; color: var(--gold); margin: 20px 0; text-shadow: 0 0 30px rgba(191,149,63,0.5); }
        
        .btn-master {
            padding: 25px 60px; background: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728); color: black; 
            font-family: 'Orbitron'; font-weight: bold; border: none; cursor: pointer; font-size: 1rem;
            clip-path: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%);
        }
        .btn-master:disabled { background: #222; color: #555; cursor: not-allowed; clip-path: none; }

        #log { position: absolute; bottom: 0; width: 100%; height: 120px; background: rgba(0,0,0,0.95); font-family: monospace; font-size: 0.75rem; color: var(--blue); padding: 10px; overflow-y: auto; border-top: 2px solid var(--gold); }
        .badge { font-size: 0.6rem; background: var(--blue); color: black; padding: 2px 5px; border-radius: 3px; float: right; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="font-family:'Orbitron'; color:var(--gold); text-align:center; margin:0;">JDP COMMAND</h2>
        <div style="font-size:0.6rem; text-align:center; color:var(--blue);">SECURITY SERVER v26.0</div>
        
        <div class="section-title">Solicitações de Cadastro</div>
        <div id="request-list"></div>
        
        <div class="section-title">Cofre de Operadores (Vault)</div>
        <div id="authorized-list"></div>
        
        <button onclick="limparTudo()" style="margin-top:auto; background:none; border:1px solid var(--red); color:var(--red); cursor:pointer; font-size:0.6rem; padding:5px;">WIPE TOTAL (RESET)</button>
    </div>

    <div class="main-panel">
        <div id="status-header" style="color:var(--blue); font-family:'Orbitron';">SISTEMA DE SEGURANÇA ATIVO</div>
        <h1 id="target-name" style="font-family:'Orbitron'; font-size:1.5rem; margin:10px 0;">AGUARDANDO OPERADOR</h1>
        
        <div class="code-display" id="code-out">------</div>
        
        <button class="btn-master" id="btn-send" onclick="autorizarERegistrar()" disabled>AUTORIZAR E GERAR ACESSO</button>

        <div id="log"></div>
    </div>

    <script>
        const MASTER_ID = 'JDP-MASTER-STATION-99';
        let peer;
        let connections = {};
        let pendingData = {}; // Armazena temporariamente nome e hash antes da autorização
        let selectedId = null;
        
        // VAULT: Banco de dados real de usuários e senhas
        let jdpVault = JSON.parse(localStorage.getItem('jdp_vault') || '[]');
        // DIRECTORY: Lista de contatos para o SYNC
        let globalDirectory = JSON.parse(localStorage.getItem('jdp_directory') || '[]');

        function init() {
            peer = new Peer(MASTER_ID);
            
            peer.on('open', (id) => {
                log("SERVIDOR DE SEGURANÇA ONLINE: " + id);
                renderLists();
            });

            peer.on('connection', conn => {
                conn.on('open', () => {
                    connections[conn.peer] = conn;
                    
                    conn.on('data', data => {
                        // 1. NOVO CADASTRO
                        if(data.type === 'REGISTER') {
                            pendingData[conn.peer] = { name: data.name, hash: data.hash };
                            addRequestUI(data.name, conn.peer);
                            log("SOLICITAÇÃO DE CADASTRO: " + data.name);
                        }
                        
                        // 2. TENTATIVA DE LOGIN
                        if(data.type === 'LOGIN') {
                            log("TENTATIVA DE LOGIN: " + data.user);
                            const user = jdpVault.find(u => u.name.toLowerCase() === data.user.toLowerCase() && u.hash === data.hash);
                            if(user) {
                                conn.send({ type: 'LOGIN_SUCCESS', peerID: user.peerID });
                                log("LOGIN APROVADO: " + data.user);
                            } else {
                                conn.send({ type: 'LOGIN_FAIL' });
                                log("LOGIN NEGADO: " + data.user);
                            }
                        }

                        // 3. SINCRONIZAÇÃO DE AGENDA
                        if(data.type === 'SYNC_ME') {
                            log("SYNC SOLICITADO POR: " + data.name);
                            conn.send({ type: 'DIRECTORY_SYNC', list: globalDirectory });
                        }
                    });
                });

                conn.on('close', () => {
                    delete connections[conn.peer];
                });
            });
        }

        function addRequestUI(name, id) {
            const list = document.getElementById('request-list');
            const div = document.createElement('div');
            div.className = 'user-card request';
            div.id = 'req-' + id;
            div.innerHTML = `<span class="badge">NOVO</span><strong>${name.toUpperCase()}</strong><br><small>AGUARDANDO SENHA...</small>`;
            div.onclick = () => selectUser(id, name, true);
            list.appendChild(div);
        }

        function selectUser(id, name, isRequest) {
            selectedId = id;
            document.querySelectorAll('.user-card').forEach(c => c.classList.remove('active'));
            const card = document.getElementById((isRequest ? 'req-' : 'auth-') + id);
            if(card) card.classList.add('active');

            document.getElementById('target-name').innerText = name.toUpperCase();
            document.getElementById('btn-send').disabled = !isRequest;
        }

        function autorizarERegistrar() {
            if(!selectedId || !connections[selectedId] || !pendingData[selectedId]) return;

            const data = pendingData[selectedId];
            const code = Math.floor(100000 + Math.random() * 900000);
            const finalPeerID = `JDP-${data.name.toUpperCase()}-${Math.floor(1000+Math.random()*9000)}`;

            // 1. Salva no Cofre (Vault)
            jdpVault.push({ name: data.name, hash: data.hash, peerID: finalPeerID });
            localStorage.setItem('jdp_vault', JSON.stringify(jdpVault));

            // 2. Salva no Diretório de Contatos
            globalDirectory.push({ id: finalPeerID, name: data.name });
            localStorage.setItem('jdp_directory', JSON.stringify(globalDirectory));

            // 3. Envia código de ativação
            connections[selectedId].send({
                type: 'AUTO_FILL_CODE',
                value: code
            });

            document.getElementById('code-out').innerText = code;
            log("CADASTRO CONCLUÍDO: " + data.name + " -> " + finalPeerID);
            
            // Limpeza UI
            document.getElementById('req-' + selectedId)?.remove();
            delete pendingData[selectedId];
            renderLists();
        }

        function renderLists() {
            const list = document.getElementById('authorized-list');
            list.innerHTML = '';
            jdpVault.forEach(user => {
                const div = document.createElement('div');
                div.className = 'user-card authorized';
                div.id = 'auth-' + user.peerID;
                div.innerHTML = `<strong>${user.name.toUpperCase()}</strong><br><small>${user.peerID}</small>`;
                div.onclick = () => selectUser(user.peerID, user.name, false);
                list.appendChild(div);
            });
        }

        function limparTudo() {
            if(confirm("ATENÇÃO: Isso apagará todos os usuários e senhas. Continuar?")) {
                localStorage.clear();
                location.reload();
            }
        }

        function log(m) {
            const l = document.getElementById('log');
            l.innerHTML += `> ${m}<br>`;
            l.scrollTop = l.scrollHeight;
        }

        init();
    </script>
</body>
</html>
