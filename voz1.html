<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JDP SUPREME - KERNEL v40</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #bf953f; --blue: #00f2ff; --bg: #050505; --card: #0d0d0d; --red: #ff3333; --green: #00ff41; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { margin: 0; padding: 0; height: 100dvh; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; overflow: hidden; }

        /* DESIGN INDUSTRIAL SUPREME */
        .screen { display: none; height: 100dvh; flex-direction: column; background: radial-gradient(circle, #111 0%, #000 100%); }
        .active { display: flex; }
        
        header { height: 70px; background: #000; border-bottom: 2px solid var(--gold); display: flex; align-items: center; padding: 0 15px; gap: 10px; box-shadow: 0 0 20px rgba(0,0,0,1); }
        .avatar { width: 45px; height: 45px; border: 1px solid var(--gold); border-radius: 5px; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; color: var(--gold); background: #111; box-shadow: 0 0 10px var(--gold); }

        /* FORMULÁRIOS */
        .input-group { width: 100%; max-width: 300px; margin-bottom: 15px; }
        input { width: 100%; padding: 15px; background: #000; border: 1px solid #333; border-bottom: 2px solid var(--gold); color: var(--blue); font-family: 'Orbitron'; text-align: center; font-size: 0.9rem; }
        .btn-supreme { width: 100%; max-width: 300px; padding: 18px; background: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728); border: none; font-family: 'Orbitron'; font-weight: bold; color: #000; cursor: pointer; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%); margin-top: 10px; }

        /* LISTA DE OPERADORES */
        #contact-list { flex: 1; overflow-y: auto; padding: 15px; }
        .operator-card { background: var(--card); border: 1px solid #222; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; border-left: 5px solid var(--blue); border-radius: 4px; cursor: pointer; transition: 0.3s; }
        .operator-card:active { background: #1a1a1a; transform: scale(0.98); }

        /* CHAT TÁTICO */
        #chat-msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); }
        .bubble { max-width: 80%; padding: 12px; border-radius: 5px; font-size: 1rem; border: 1px solid #333; position: relative; }
        .me { align-self: flex-end; background: #002b2d; border-right: 4px solid var(--blue); }
        .them { align-self: flex-start; background: #1a1a1a; border-left: 4px solid var(--gold); }

        /* BARRA TÉCNICA */
        .tech-bar { background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; padding: 10px; }
        .btn-tool { background: #111; border: 1px solid var(--gold); color: var(--gold); width: 45px; height: 45px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; }
        
        .input-area { padding: 10px; background: #000; display: flex; gap: 10px; border-top: 1px solid #333; }
        #chat-input { flex: 1; background: #111; border: 1px solid #333; padding: 12px; color: white; border-radius: 4px; text-align: left; }

        /* CALL OVERLAY */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .pulse { animation: pulse-blue 2s infinite; border-radius: 50%; }
        @keyframes pulse-blue { 0% { box-shadow: 0 0 0 0 rgba(0, 242, 255, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(0, 242, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 242, 255, 0); } }
    </style>
</head>
<body>

    <!-- TELA DE CADASTRO / LOGIN FIXO -->
    <div id="screen-login" class="screen active">
        <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px;">
            <div class="avatar" style="width:80px; height:80px; font-size:2rem; margin-bottom:20px;">JDP</div>
            <h2 style="font-family:'Orbitron'; color:var(--gold); margin:0;">REGISTRO DE OPERADOR</h2>
            <p style="color:var(--blue); font-size:0.7rem; margin-bottom:30px; letter-spacing:2px;">SISTEMA DE ID FIXO v40</p>
            
            <div class="input-group">
                <input type="text" id="reg-name" placeholder="NOME DO OPERADOR (EX: JOSE)">
            </div>
            <button class="btn-supreme" onclick="registrarOperador()">ATIVAR IDENTIDADE</button>
        </div>
    </div>

    <!-- HUB PRINCIPAL -->
    <div id="screen-hub" class="screen">
        <header>
            <div class="avatar" id="my-avatar">?</div>
            <div style="flex:1">
                <div id="my-display-name" style="font-family:'Orbitron'; font-size:0.9rem; color:var(--gold);">---</div>
                <div id="my-fixed-id" style="font-size:0.6rem; color:var(--blue);">ID FIXO: ---</div>
            </div>
            <button class="btn-tool" onclick="abrirAdd()">+</button>
        </header>
        <div style="padding:10px; font-size:0.7rem; color:#555; font-family:'Orbitron';">OPERADORES NA REDE</div>
        <div id="contact-list"></div>
    </div>

    <!-- CHAT TÁTICO -->
    <div id="screen-chat" class="screen">
        <header>
            <button onclick="fecharChat()" class="btn-tool" style="border:none;">←</button>
            <div style="flex:1">
                <div id="chat-title" style="font-family:'Orbitron'; font-size:0.9rem;">---</div>
                <div style="font-size:0.6rem; color:var(--green);">CONEXÃO CRIPTOGRAFADA</div>
            </div>
            <button onclick="iniciarChamada()" class="btn-tool">📞</button>
        </header>
        <div id="chat-msgs"></div>
        <div class="tech-bar">
            <button class="btn-tool" onclick="tecladoVoz()">🎤</button>
            <label class="btn-tool">📷<input type="file" hidden accept="image/*" onchange="enviarMidia(this)"></label>
            <button class="btn-tool" onclick="enviarLocalizacao()">📍</button>
            <button class="btn-tool" id="ptt-btn">📻</button>
        </div>
        <div class="input-area">
            <input type="text" id="chat-input" placeholder="Comando...">
            <button class="btn-tool" onclick="enviarTexto()" style="color:var(--blue); border-color:var(--blue);">➤</button>
        </div>
    </div>

    <!-- MODAL ADICIONAR OPERADOR -->
    <div id="modal-add" class="overlay">
        <div style="background:#0d0d0d; padding:25px; border:2px solid var(--gold); width:90%; max-width:350px; text-align:center;">
            <h3 style="font-family:'Orbitron'; color:var(--gold);">CONECTAR OPERADOR</h3>
            <p style="font-size:0.7rem; color:#777;">DIGITE O NOME DO OPERADOR QUE DESEJA ADICIONAR</p>
            <input type="text" id="add-name-input" placeholder="NOME (EX: PEDRO)" style="margin-bottom:15px;">
            <button class="btn-supreme" onclick="confirmarAdd()">ADICIONAR À LISTA</button>
            <button class="btn-supreme" style="background:#222; color:#fff;" onclick="fecharAdd()">CANCELAR</button>
        </div>
    </div>

    <!-- TELA DE CHAMADA -->
    <div id="call-ui" class="overlay">
        <div class="avatar pulse" style="width:100px; height:100px; font-size:2.5rem; margin-bottom:20px;">📞</div>
        <h2 id="call-name" style="font-family:'Orbitron';">CHAMADA ATIVA</h2>
        <button class="btn-supreme" style="background:var(--red); width:200px;" onclick="encerrarChamada()">DESLIGAR</button>
    </div>

    <script>
        let peer, myID, activeChat = null, currentCall = null;
        let db = { contacts: JSON.parse(localStorage.getItem('jdp_contacts') || '[]'), history: {} };

        // --- SISTEMA DE IDENTIDADE FIXA ---
        window.onload = () => {
            const savedName = localStorage.getItem('jdp_name');
            if(savedName) {
                document.getElementById('reg-name').value = savedName;
                registrarOperador();
            }
        };

        function registrarOperador() {
            const nome = document.getElementById('reg-name').value.trim().toUpperCase();
            if(!nome) return alert("DIGITE SEU NOME");

            localStorage.setItem('jdp_name', nome);
            myID = `JDP-OP-${nome}`; // ID FIXO BASEADO NO NOME

            peer = new Peer(myID);

            peer.on('open', (id) => {
                document.getElementById('my-display-name').innerText = nome;
                document.getElementById('my-fixed-id').innerText = `ID FIXO: ${id}`;
                document.getElementById('my-avatar').innerText = nome[0];
                document.getElementById('screen-login').classList.remove('active');
                document.getElementById('screen-hub').classList.add('active');
                renderList();
            });

            peer.on('connection', conn => {
                conn.on('data', data => receberMensagem(data, conn.peer));
            });

            peer.on('call', call => {
                if(confirm("CHAMADA DE VOZ ENTRANTE. ATENDER?")) {
                    navigator.mediaDevices.getUserMedia({audio: true}).then(stream => {
                        call.answer(stream);
                        abrirCallUI(call.peer);
                        call.on('stream', remoteStream => playAudio(remoteStream));
                        currentCall = call;
                    });
                }
            });
        }

        // --- GESTÃO DE CONTATOS ---
        function abrirAdd() { document.getElementById('modal-add').style.display = 'flex'; }
        function fecharAdd() { document.getElementById('modal-add').style.display = 'none'; }

        function confirmarAdd() {
            const nome = document.getElementById('add-name-input').value.trim().toUpperCase();
            if(!nome) return;
            const targetID = `JDP-OP-${nome}`;
            
            if(!db.contacts.find(c => c.id === targetID)) {
                db.contacts.push({ id: targetID, name: nome });
                localStorage.setItem('jdp_contacts', JSON.stringify(db.contacts));
            }
            renderList();
            fecharAdd();
        }

        function renderList() {
            const container = document.getElementById('contact-list');
            container.innerHTML = '';
            db.contacts.forEach(c => {
                const div = document.createElement('div');
                div.className = 'operator-card';
                div.onclick = () => abrirChat(c.id, c.name);
                div.innerHTML = `<div class="avatar">${c.name[0]}</div><div style="flex:1"><b>${c.name}</b><br><small style="color:var(--blue)">${c.id}</small></div>`;
                container.appendChild(div);
            });
        }

        // --- TECNOLOGIAS DE COMUNICAÇÃO ---
        function enviarTexto() {
            const msg = document.getElementById('chat-input').value;
            if(!msg) return;
            const payload = { type: 'TEXT', content: msg, sender: localStorage.getItem('jdp_name') };
            enviarPayload(payload);
            document.getElementById('chat-input').value = '';
        }

        function tecladoVoz() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'pt-BR';
            recognition.onresult = (e) => { document.getElementById('chat-input').value = e.results[0][0].transcript; };
            recognition.start();
        }

        function enviarLocalizacao() {
            navigator.geolocation.getCurrentPosition(p => {
                const link = `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
                enviarPayload({ type: 'TEXT', content: `📍 LOCALIZAÇÃO TÁTICA: ${link}`, sender: localStorage.getItem('jdp_name') });
            });
        }

        function enviarMidia(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = () => enviarPayload({ type: 'IMG', content: reader.result, sender: localStorage.getItem('jdp_name') });
            reader.readAsDataURL(file);
        }

        function iniciarChamada() {
            navigator.mediaDevices.getUserMedia({audio: true}).then(stream => {
                const call = peer.call(activeChat.id, stream);
                abrirCallUI(activeChat.name);
                call.on('stream', remoteStream => playAudio(remoteStream));
                currentCall = call;
            });
        }

        // --- ENGINE DE CONEXÃO ---
        function enviarPayload(payload) {
            const conn = peer.connect(activeChat.id);
            conn.on('open', () => {
                conn.send(payload);
                salvarHistorico(activeChat.id, payload, 'me');
                renderMessages();
            });
        }

        function receberMensagem(data, fromID) {
            salvarHistorico(fromID, data, 'them');
            if(activeChat && activeChat.id === fromID) renderMessages();
            else {
                // Notifica se o chat não estiver aberto
                const op = db.contacts.find(c => c.id === fromID);
                if(op) alert(`NOVA MENSAGEM DE: ${op.name}`);
            }
        }

        function salvarHistorico(chatId, data, side) {
            if(!db.history[chatId]) db.history[chatId] = [];
            db.history[chatId].push({ ...data, side });
        }

        function renderMessages() {
            const container = document.getElementById('chat-msgs');
            container.innerHTML = '';
            (db.history[activeChat.id] || []).forEach(m => {
                const div = document.createElement('div');
                div.className = `bubble ${m.side}`;
                let content = m.content;
                if(m.type === 'IMG') content = `<img src="${m.content}" style="max-width:100%; border-radius:5px;">`;
                div.innerHTML = `<small style="display:block; font-size:0.6rem; color:var(--gold)">${m.sender}</small>${content}`;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        // --- UTILITÁRIOS ---
        function abrirChat(id, name) {
            activeChat = { id, name };
            document.getElementById('screen-hub').classList.remove('active');
            document.getElementById('screen-chat').classList.add('active');
            document.getElementById('chat-title').innerText = name;
            renderMessages();
        }
        function fecharChat() { document.getElementById('screen-chat').classList.remove('active'); document.getElementById('screen-hub').classList.add('active'); }
        function abrirCallUI(name) { document.getElementById('call-ui').style.display = 'flex'; document.getElementById('call-name').innerText = name; }
        function encerrarChamada() { if(currentCall) currentCall.close(); location.reload(); }
        function playAudio(stream) { const audio = new Audio(); audio.srcObject = stream; audio.play(); }
    </script>
</body>
</html>
