<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JDP OPERADOR - KERNEL v25</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #bf953f; --blue: #00f2ff; --bg: #050505; --card: #0d0d0d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { margin: 0; padding: 0; height: 100dvh; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; overflow: hidden; }

        /* TELAS */
        .screen { display: none; height: 100dvh; flex-direction: column; }
        .active { display: flex; }

        /* ACESSO */
        .gate-box { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: var(--card); border: 2px solid var(--gold); padding: 30px; width: 100%; max-width: 350px; text-align: center; box-shadow: 0 0 30px rgba(191,149,63,0.2); }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #333; color: var(--blue); text-align: center; font-size: 1.2rem; font-family: 'Orbitron'; border-radius: 4px; }
        .btn-gold { width: 100%; padding: 18px; background: var(--gold); border: none; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; color: black; transition: 0.3s; border-radius: 4px; }
        .btn-gold:disabled { background: #222; color: #555; }

        /* HUB */
        header { height: 70px; background: #000; border-bottom: 2px solid var(--gold); display: flex; align-items: center; padding: 0 15px; gap: 10px; }
        .tab-bar { display: flex; background: #000; border-bottom: 1px solid #222; }
        .tab { flex: 1; padding: 15px; text-align: center; font-family: 'Orbitron'; font-size: 0.7rem; color: #555; cursor: pointer; }
        .tab.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

        #list-container { flex: 1; overflow-y: auto; padding: 10px; }
        .item-card { background: #111; border: 1px solid #222; padding: 15px; margin-bottom: 8px; display: flex; align-items: center; gap: 15px; border-left: 4px solid var(--blue); position: relative; }
        .avatar { width: 45px; height: 45px; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; color: var(--gold); border: 1px solid var(--gold); }

        /* CHAT */
        #chat-screen { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: none; flex-direction: column; }
        #chat-msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 80%; padding: 12px; border-radius: 4px; font-size: 1rem; position: relative; }
        .me { align-self: flex-end; background: #003335; border-right: 3px solid var(--blue); }
        .them { align-self: flex-start; background: #1a1a1a; border-left: 3px solid var(--gold); }
        .sender-tag { font-size: 0.6rem; color: var(--gold); display: block; margin-bottom: 4px; font-family: 'Orbitron'; }

        .input-area { padding: 15px; background: #000; display: flex; gap: 10px; border-top: 1px solid #222; }
        .fab { position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(191,149,63,0.5); cursor: pointer; z-index: 90; }

        /* MODAL */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #0a0a0a; border: 1px solid var(--gold); padding: 20px; width: 100%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>

    <!-- TELA DE ACESSO -->
    <div id="screen-access" class="screen active">
        <div class="gate-box">
            <div class="card">
                <h2 style="font-family:'Orbitron'; color:var(--gold); margin:0 0 20px 0;">JDP KERNEL</h2>
                <div id="phase-1">
                    <input type="text" id="reg-nome" placeholder="NOME DO OPERADOR">
                    <button class="btn-gold" onclick="solicitarAcesso()">SOLICITAR ENTRADA</button>
                </div>
                <div id="phase-2" style="display:none;">
                    <p style="font-size:0.7rem; color:var(--blue);">AGUARDANDO INJEÇÃO DO MASTER...</p>
                    <input type="number" id="injected-code" placeholder="------" readonly>
                    <button class="btn-gold" id="btn-ativar" disabled onclick="ativarSistema()">ATIVAR AGORA</button>
                </div>
            </div>
        </div>
    </div>

    <!-- HUB PRINCIPAL -->
    <div id="screen-hub" class="screen">
        <header>
            <div class="avatar" id="my-avatar">?</div>
            <div style="flex:1">
                <div id="my-display-name" style="font-family:'Orbitron'; font-size:0.9rem; color:var(--gold);">---</div>
                <div id="my-display-id" style="font-size:0.6rem; color:var(--blue);">ID: ---</div>
            </div>
            <button onclick="syncComMaster()" style="background:#111; border:1px solid var(--gold); color:var(--gold); font-size:0.6rem; padding:8px; border-radius:4px;">SYNC</button>
        </header>
        
        <div class="tab-bar">
            <div class="tab active" id="tab-chats" onclick="switchTab('chats')">OPERADORES</div>
            <div class="tab" id="tab-groups" onclick="switchTab('groups')">GRUPOS</div>
        </div>

        <div id="list-container"></div>

        <div class="fab" onclick="abrirMenu()">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="black"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </div>
    </div>

    <!-- TELA DE CHAT -->
    <div id="chat-screen">
        <header>
            <button onclick="fecharChat()" style="background:none; border:none; color:var(--gold); font-size:1.5rem;">←</button>
            <div style="flex:1; margin-left:10px;">
                <div id="chat-title" style="font-family:'Orbitron'; font-size:0.9rem;">---</div>
                <div id="chat-subtitle" style="font-size:0.6rem; color:var(--blue);">Conexão P2P Ativa</div>
            </div>
        </header>
        <div id="chat-msgs"></div>
        <div class="input-area">
            <input type="text" id="chat-input" placeholder="Mensagem industrial..." style="margin:0; text-align:left; font-size:1rem;">
            <button class="btn-gold" onclick="enviarMensagem()" style="width:80px; padding:0;">></button>
        </div>
    </div>

    <!-- MODAL DE OPÇÕES -->
    <div class="modal" id="modal-menu">
        <div class="modal-content">
            <h3 style="font-family:'Orbitron'; color:var(--gold);">OPÇÕES DE REDE</h3>
            <button class="btn-gold" onclick="addManual()" style="margin-bottom:10px;">ADICIONAR OPERADOR (ID)</button>
            <button class="btn-gold" onclick="criarGrupo()" style="background:var(--blue); margin-bottom:10px;">CRIAR NOVO GRUPO</button>
            <button class="btn-gold" onclick="fecharModal()" style="background:none; color:white; border:1px solid #333;">CANCELAR</button>
        </div>
    </div>

    <script>
        const MASTER_ID = 'JDP-MASTER-STATION-99';
        let peer, myID, activeChat = null;
        
        // BANCO DE DADOS LOCAL
        let db = {
            contacts: JSON.parse(localStorage.getItem('jdp_contacts') || '[]'),
            groups: JSON.parse(localStorage.getItem('jdp_groups') || '[]'),
            history: JSON.parse(localStorage.getItem('jdp_history') || '{}')
        };

        function saveDB() {
            localStorage.setItem('jdp_contacts', JSON.stringify(db.contacts));
            localStorage.setItem('jdp_groups', JSON.stringify(db.groups));
            localStorage.setItem('jdp_history', JSON.stringify(db.history));
        }

        window.onload = () => {
            const savedID = localStorage.getItem('JDP_PERM_ID');
            if(savedID) {
                myID = savedID;
                iniciarSistema();
            }
        };

        // --- ACESSO ---
        function solicitarAcesso() {
            const nome = document.getElementById('reg-nome').value;
            if(!nome) return;
            const tempID = 'JDP-TEMP-' + Math.floor(Math.random()*9999);
            peer = new Peer(tempID);
            peer.on('open', () => {
                const conn = peer.connect(MASTER_ID);
                conn.on('open', () => {
                    conn.send({ type: 'REQUEST', name: nome });
                    document.getElementById('phase-1').style.display = 'none';
                    document.getElementById('phase-2').style.display = 'block';
                });
                conn.on('data', data => {
                    if(data.type === 'AUTO_FILL_CODE') {
                        document.getElementById('injected-code').value = data.value;
                        document.getElementById('btn-ativar').disabled = false;
                        localStorage.setItem('TEMP_NAME', nome);
                    }
                });
            });
        }

        function ativarSistema() {
            const nome = localStorage.getItem('TEMP_NAME');
            myID = `JDP-${nome.toUpperCase()}-${Math.random().toString(36).substr(2,4).toUpperCase()}`;
            localStorage.setItem('JDP_PERM_ID', myID);
            location.reload();
        }

        // --- CORE ---
        function iniciarSistema() {
            document.getElementById('screen-access').classList.remove('active');
            document.getElementById('screen-hub').classList.add('active');
            document.getElementById('my-display-name').innerText = myID.split('-')[1];
            document.getElementById('my-display-id').innerText = myID;
            document.getElementById('my-avatar').innerText = myID.split('-')[1][0];

            peer = new Peer(myID);
            peer.on('open', () => syncComMaster());
            
            peer.on('connection', conn => {
                conn.on('data', data => {
                    if(data.type === 'DIRECTORY_SYNC') {
                        data.list.forEach(c => {
                            if(c.id !== myID && !db.contacts.find(x => x.id === c.id)) {
                                db.contacts.push(c);
                            }
                        });
                        saveDB();
                        renderList('chats');
                    } else {
                        receberMensagem(data, conn.peer);
                    }
                });
            });
            renderList('chats');
        }

        function syncComMaster() {
            const conn = peer.connect(MASTER_ID);
            conn.on('open', () => {
                conn.send({ type: 'SYNC_ME', id: myID, name: myID.split('-')[1] });
            });
        }

        // --- MENSAGENS ---
        function receberMensagem(data, fromID) {
            const chatId = data.groupId || fromID;
            if(!db.history[chatId]) db.history[chatId] = [];
            
            db.history[chatId].push({
                side: 'them',
                text: data.text,
                sender: data.senderName,
                time: new Date().toLocaleTimeString()
            });

            if(data.groupId && !db.groups.find(g => g.id === data.groupId)) {
                db.groups.push({ id: data.groupId, name: data.groupName, members: data.members });
            }

            saveDB();
            if(activeChat && activeChat.id === chatId) renderMessages();
            renderList('chats');
        }

        function enviarMensagem() {
            const input = document.getElementById('chat-input');
            if(!input.value) return;
            const texto = input.value;
            const meuNome = myID.split('-')[1];

            if(activeChat.type === 'PRIVATE') {
                const conn = peer.connect(activeChat.id);
                conn.on('open', () => {
                    conn.send({ type: 'MSG', text: texto, senderName: meuNome });
                });
            } else {
                const grupo = db.groups.find(g => g.id === activeChat.id);
                grupo.members.forEach(mID => {
                    if(mID !== myID) {
                        const conn = peer.connect(mID);
                        conn.on('open', () => {
                            conn.send({ type: 'MSG', groupId: grupo.id, groupName: grupo.name, members: grupo.members, text: texto, senderName: meuNome });
                        });
                    }
                });
            }

            if(!db.history[activeChat.id]) db.history[activeChat.id] = [];
            db.history[activeChat.id].push({ side: 'me', text: texto, sender: meuNome });
            saveDB();
            renderMessages();
            input.value = '';
        }

        // --- UI ---
        function renderList(type) {
            const container = document.getElementById('list-container');
            container.innerHTML = '';
            const items = type === 'chats' ? db.contacts : db.groups;

            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item-card';
                div.onclick = () => abrirChat(item.id, item.name, type === 'chats' ? 'PRIVATE' : 'GROUP');
                div.innerHTML = `
                    <div class="avatar" style="${type === 'groups' ? 'background:var(--gold); color:black;' : ''}">
                        ${type === 'chats' ? item.name[0] : 'G'}
                    </div>
                    <div>
                        <b>${item.name}</b><br>
                        <small style="color:#555">${type === 'chats' ? item.id : item.members.length + ' MEMBROS'}</small>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function abrirChat(id, name, type) {
            activeChat = { id, name, type };
            document.getElementById('chat-screen').style.display = 'flex';
            document.getElementById('chat-title').innerText = name;
            renderMessages();
        }

        function renderMessages() {
            const container = document.getElementById('chat-msgs');
            container.innerHTML = '';
            (db.history[activeChat.id] || []).forEach(m => {
                const div = document.createElement('div');
                div.className = `bubble ${m.side}`;
                div.innerHTML = `<span class="sender-tag">${m.sender}</span>${m.text}`;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        // --- FUNÇÕES DE ADICIONAR ---
        function addManual() {
            const id = prompt("Cole o ID JDP do Operador:");
            if(id && id.startsWith('JDP-')) {
                const nome = id.split('-')[1];
                if(!db.contacts.find(c => c.id === id)) {
                    db.contacts.push({ id, name: nome });
                    saveDB();
                    renderList('chats');
                    alert("Operador adicionado à agenda local.");
                }
            }
            fecharModal();
        }

        function criarGrupo() {
            const nome = prompt("Nome do Grupo Industrial:");
            if(!nome) return;
            const gID = 'GRP-' + Math.random().toString(36).substr(2,5).toUpperCase();
            const members = [myID, ...db.contacts.map(c => c.id)];
            db.groups.push({ id: gID, name: nome, members: members });
            saveDB();
            renderList('groups');
            fecharModal();
        }

        function switchTab(t) {
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + t).classList.add('active');
            renderList(t === 'chats' ? 'chats' : 'groups');
        }

        function abrirMenu() { document.getElementById('modal-menu').style.display = 'flex'; }
        function fecharModal() { document.getElementById('modal-menu').style.display = 'none'; }
        function fecharChat() { document.getElementById('chat-screen').style.display = 'none'; activeChat = null; }
    </script>
</body>
    </html>
